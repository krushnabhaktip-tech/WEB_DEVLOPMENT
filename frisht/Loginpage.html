<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment From</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
         
     
    <From action="">
        <h1 class="main_hrading">Payment From 👛</h1>
        <p>Required  fileds are followed by * </p>
        <h2>Contact Information</h2>
        <p>Name:*<input type="text" name="name"></p>
        <fieldset>
            <legend>gender</legend>
        <p>
             
            Male *<input type="radio" name="gender" id="male"> 
            Famle *<input type="radio" name="gender" id="female">
             
        </p>
        </fieldset>
        <p>Address: <textarea name="address" id="address" cols="100" rows="10"></textarea></p>
        <p>Email: *<input type="email" name="email" id="email"></p>
        <p>Pincode: *<input type="number" name="pincode" id="pincode"></p>
        <h2>Payment information</h2>
        <p>Card Type:
            <select name="card_type" id="card_type">
                <option value="">--------Select a card Type--------</option>
                <option value="visa">visa</option>
                <option value="rupay">Rupay</option>
                <option value="mastercard">MasterCard</option>
                 
            </select>
        </p>
        <p>
            card Number *<input type="number" name="card_number" id="card_number">
        </p>
        <p>
            Expiration Date: <input type="date" name="exp_date" id="exp_date">
        </p>
        <p>CVV <input type="password" name="CVV" id="CVV"></p>
        <input type="submit" value="Pay Now">
        <input type="reset" value="ReStart">

    </From>
    </div>
</body>
</html>
