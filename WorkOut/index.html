<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Hub 🎯</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode" onclick="startBackgroundMusic()">

    <div id="app-box">
        <div id="welcome-screen" class="profile-card welcome-card">
            <h2>Welcome to Workout Hub 💪</h2>
            <p class="sub-text">Your Ultimate Fitness Companion ⚡</p>
            <div class="welcome-spacer"></div>
            <button class="round-btn btn-start" onclick="startApp()">Start Workout 😊</button>
        </div>

        <div id="profile-setup-card" class="profile-card" style="display: none;">
            <h2><span id="profile-title-text">📝 Create Profile</span></h2>
            
            <div class="form-grid">
                <div>
                    <label>👤 Username</label>
                    <input type="text" id="user-name" placeholder="Enter username">
                </div>
                <div>
                    <label>🔢 Age</label>
                    <input type="number" id="user-age" placeholder="Enter age">
                </div>
                <div>
                    <label>⚧️ Gender</label>
                    <select id="user-gender">
                        <option value="Male">Male 🧑</option>
                        <option value="Female">Female 👧</option>
                    </select>
                </div>
                <div>
                    <label>📧 Email</label>
                    <input type="email" id="user-email" placeholder="Enter email">
                </div>
            </div>

            <div style="margin-top: 15px;">
                <label style="font-weight: 600;">🖼️ Choose Profile Display Mode:</label>
                <div class="avatar-options">
                    <label><input type="radio" name="avatar-type" value="upload" checked onchange="switchAvatarView()"> Upload Photo 📸</label>
                    <label><input type="radio" name="avatar-type" value="anime" onchange="switchAvatarView()"> Anime Character 🥷</label>
                </div>
            </div>

            <div id="avatar-input-container" style="margin-top: 10px; display: block;">
                <input type="file" id="user-avatar" accept="image/*" onchange="previewUploadedFile(event)">
            </div>

               <div id="anime-select-container" style="margin-top: 10px; display: none;">
                <select id="anime-dp-select">
                    <option value="images/naruto.png"> Naruto Uzumaki </option>
                    <option value="images/kamado.png"> Tanjiro Kamado </option>
                    <option value="images/kakashi.png"> kakashi </option>
                    <option value="images/narutof.png"> naruto All</option>
                    <option value="images/gojo.png"> gojo saturo</option>
                    <option value="images/saske.png"> saske</option>
                    <option value="images/nezuko.png"> nezuko</option>
                    <option value="images/yuji.png"> yuji itadori</option>
                    <option value="images/marin.png"> marin </option>
                    <option value="images/aniya.png"> aniya </option>
                    <option value="images/gril.png"> gril </option>
                </select>
            </div>


            <div style="margin-top: 25px; display: flex; gap: 12px;">
                <button class="round-btn btn-start" onclick="validateAndSaveProfile()">Save & Continue ➡️</button>
                <button id="profile-cancel-btn" class="round-btn btn-back" onclick="cancelProfileEdit()" style="display: none;">Cancel</button>
            </div>
        </div>

        <div id="exercise-screen" class="profile-card" style="display: none;">
            <div class="dashboard-header">
                <button class="settings-circle-btn" onclick="openSettingsPanel()">⚙️</button>
                <h2 style="font-size: 20px; margin: 0;">Exercise Dashboard</h2>
                <div id="view-avatar-div" class="avatar-circle clickable-avatar" onclick="goToProfileEdit()"></div>
            </div>

            <div id="exercise-options-panel" class="workout-buttons">
                <button class="exercise-choice-btn" onclick="openStepTracker()">🏃 Walking & Running Tracker</button>
                <button class="exercise-choice-btn" onclick="openWorkoutRoutine('Strength')">🏋️ Strength Workout</button>
                <button class="exercise-choice-btn" onclick="openWorkoutRoutine('Yoga')">🧘 Yoga & Flexibility</button>
            </div>

            <div id="step-tracker-panel" style="display: none; margin-top: 20px; text-align: center;">
                <div class="day-info-box">
                    <h2 id="step-day-title">Day 3</h2>
                    <p>🎯 Target Goal: 10 Steps</p>
                </div>
                
                <div class="workout-animation-container giant-emoji-box">
                    <span id="animation-emoji">🧍</span>
                </div>
                
                <div class="counter-card">
                    <span style="font-size: 14px; opacity: 0.8;">Steps Counted</span>
                    <h1 id="live-steps" style="font-size: 48px; margin: 5px 0;">0</h1>
                    <p>🏁 Distance: <strong id="live-distance">0.00</strong> km</p>
                </div>
                
                <div class="button-group-vertical">
                    <button id="start-track-btn" class="round-btn btn-start" onclick="toggleStepTracking()">Start Tracking 🟢</button>
                    <button id="save-day-btn" class="round-btn btn-save" onclick="saveAndNextStepDay()" style="display: none; margin-top: 10px;">Save Progress 💾</button>
                    <button class="round-btn btn-back" onclick="closeStepTracker()" style="margin-top: 10px;">Back 🔙</button>
                </div>
            </div>

            <div id="workout-routine-panel" style="display: none; margin-top: 20px; text-align: center;">
                <div class="day-info-box pink-theme-box">
                    <h2 id="routine-day-title">Day 3 - Strength</h2>
                    <p id="routine-day-sub">Exercise 1 of 3</p>
                </div>

                <div class="workout-animation-container giant-emoji-box pink-border">
                    <span id="routine-emoji">🏋️</span>
                </div>

                <div class="exercise-detail-card">
                    <h3 id="routine-exercise-name">Jumping Jacks</h3>
                    <div id="routine-timer-display">00:30</div>
                </div>

                <div class="media-controls-group">
                    <button class="media-circle-btn" onclick="navigateExercise(-1)">⏮️</button>
                    <button id="media-play-pause-btn" class="media-main-pink-btn" onclick="toggleRoutineTimer()">PAUSE ⏸️</button>
                    <button class="media-circle-btn" onclick="navigateExercise(1)">⏭️</button>
                </div>

                <button class="round-btn btn-back" onclick="closeWorkoutRoutine()" style="margin-top: 20px;">Exit Workout 🔙</button>
            </div>
        </div>

           <div id="pure-settings-screen" class="profile-card" style="display: none;">
            <div class="dashboard-header">
                <h2>⚙️ System Settings</h2>
                <button class="settings-circle-btn" onclick="toggleSettingsPanel()">⚙️</button>
            </div>
            <div class="welcome-spacer" style="height: 15px;"></div>
            
            <button id="quick-mute-btn" class="round-btn btn-start" onclick="toggleMute()" style="margin-bottom: 20px;">
                🔊 Audio Status: Playing
            </button>
            
            <div style="text-align: left; margin-bottom: 20px;">
                <label>🎵 Choose Background Track</label>
                <select id="direct-song-select" onchange="changeBackgroundSong()">
                    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Default Music (Online) 🧘</option>
                    <option value="music/1.mp3">Yoga Meditation Track 🧘‍♂️</option>
                    <option value="music/2.mp3">Morning Bhajan 🕉️</option>
                    <option value="music/3.mp3">Bollywood Workout Beat 💃</option>
                </select>
            </div>
            
            <div style="text-align: left; margin-bottom: 20px;">
                <label id="volume-label">🔊 Background Track Volume Adjust</label>
                <input type="range" id="volume" min="0" max="1" step="0.1" value="0.4" oninput="adjustVolume(this.value)" style="margin-top: 10px; width: 100%;">
            </div>
            
            <button class="round-btn btn-back dynamic-theme-btn" onclick="toggleTheme()">🌓 Switch Dark/Light Theme</button>
        </div>
    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script src="logic.js"></script>
</body>
</html>
