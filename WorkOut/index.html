<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YogaFit - Wellness Journey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <div id="start-screen">
        <button id="start-workout-btn" onclick="startWorkout()">🧘‍♂️ Begin Yoga Journey</button>
    </div>

    <div class="app-box" id="main-workout-content" style="display: none;">
        
        <div class="user-info-container">
            <button class="info-icon-btn" onclick="toggleUserInfoMenu()">👤 Profile</button>
            <div class="info-dropdown info-dropdown-hidden" id="user-info-menu">
                <h3>✨ Your Profile</h3>
                <p><strong>📛 Name:</strong> <span id="view-name">-</span></p>
                <p><strong>🎂 Age:</strong> <span id="view-age">-</span></p>
                <p><strong>🧬 Gender:</strong> <span id="view-gender">-</span></p>
                <p><strong>📧 Email:</strong> <span id="view-email">-</span></p>
                <p><strong>📞 Phone:</strong> <span id="view-phone">-</span></p>
                <p><strong>📍 Address:</strong> <span id="view-address">-</span></p>
                <div id="view-avatar-div" style="margin: 10px 0;"></div>
                <button class="edit-profile-btn" onclick="enableProfileEditing()">✏️ Edit Profile</button>
            </div>
        </div>

        <div class="settings-container">
            <button class="settings-icon-btn" onclick="toggleSettingsMenu()">⚙️ Settings</button>
            <div class="settings-dropdown settings-dropdown-hidden" id="settings-menu">
                <h3>🛠️ Settings</h3>
                <div class="setting-item">
                    <label>🎨 Theme:</label>
                    <button id="theme-btn" onclick="toggleTheme()">🌙 Dark</button>
                </div>
                <div class="setting-item">
                    <label>⏱️ Rest Time:</label>
                    <div class="rest-control">
                        <button onclick="changeRestTime(-5)">➖</button>
                        <span id="rest-display">30s</span>
                        <button onclick="changeRestTime(5)">➕</button>
                    </div>
                </div>
                <div class="setting-item">
                    <label>🎵 Audio Volume:</label>
                    <div class="music-control-row">
                        <input type="range" id="volume" min="0" max="10" value="5">
                        <span id="mute-btn" onclick="toggleMute()" style="cursor: pointer; font-size: 20px;">🔊</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label>🎼 Background Track:</label>
                    <select id="music-track">
                        <option value="energetic">⚡ Gym Beat</option>
                        <option value="nature">🍃 Soft Nature</option>
                        <option value="lofi" selected>🎵 Relaxing Lofi</option>
                    </select>
                </div>
                <div class="setting-item">
                    <button class="reset-btn" onclick="resetProfile()">🔄 Reset App</button>
                </div>
            </div>
        </div>

        <div class="profile-card" id="profile-setup-card">
            <h1>Mindful Yoga 🧘‍♀️</h1>
            <p>Connect your soul and body. Setup your profile, Buddy!</p>
            
            <form class="profile-form" onsubmit="event.preventDefault();">
                <div class="form-grid">
                    <div class="input-field">
                        <label>👤 Enter Your Name:</label>
                        <input type="text" id="username" placeholder="Your nickname..." required>
                    </div>
                    <div class="input-field">
                        <label>🎂 Enter Your Age:</label>
                        <input type="number" id="user-age" placeholder="Your age..." required>
                    </div>
                    <div class="input-field">
                        <label>🧬 Gender:</label>
                        <select id="user-gender" required>
                            <option value="">Select Gender</option>
                            <option value="Female">Female</option>
                            <option value="Male">Male</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="input-field">
                        <label>📧 Email ID:</label>
                        <input type="email" id="user-email" placeholder="example@mail.com" required>
                    </div>
                    <div class="input-field">
                        <label>🔒 Setup Profile Password:</label>
                        <input type="password" id="user-password" placeholder="Min 6 characters..." required>
                    </div>
                    <div class="input-field">
                        <label>📞 Phone Number:</label>
                        <input type="tel" id="user-phone" placeholder="Phone number..." required>
                    </div>
                </div>

                <div class="input-field" style="margin-top: 15px;">
                    <label>📍 Address:</label>
                    <input type="text" id="user-address" placeholder="Your address..." required>
                </div>

                <div class="avatar-section">
                    <label>🖼️ Choose Profile Picture Style:</label>
                    <div class="avatar-options">
                        <label><input
