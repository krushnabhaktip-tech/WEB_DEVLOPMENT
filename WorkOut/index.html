<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <div id="app-box">
        <!-- Welcome Screen -->
        <div id="welcome-screen" class="profile-card welcome-card">
            <h2>Welcome to Workout Hub</h2>
            <div class="welcome-spacer"></div>
            <button class="next-btn start-btn" onclick="startApp()">Start 🚀</button>
        </div>

        <!-- Profile Setup Card -->
        <div id="profile-setup-card" class="profile-card" style="display: none;">
            <h2>Create Profile</h2>
            
            <div class="form-grid">
                <div>
                    <label>Username</label>
                    <input type="text" id="user-name" placeholder="Enter username">
                </div>
                <div>
                    <label>Age</label>
                    <input type="number" id="user-age" placeholder="Enter age">
                </div>
                <div>
                    <label>Gender</label>
                    <select id="user-gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div>
                    <label>Email</label>
                    <input type="email" id="user-email" placeholder="Enter email">
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" id="user-password" placeholder="••••••">
                </div>
                <div>
                    <label>Phone Number</label>
                    <input type="text" id="user-phone" placeholder="Enter phone">
                </div>
            </div>

            <div style="margin-top: 15px;">
                <label>Address</label>
                <input type="text" id="user-address" placeholder="Enter address">
            </div>

            <div style="margin-top: 15px;">
                <label style="font-weight: 600;">Choose Profile Display Mode:</label>
                <div class="avatar-options">
                    <label><input type="radio" name="avatar-type" value="upload" checked onchange="switchAvatarView()"> Upload Photo</label>
                    <label><input type="radio" name="avatar-type" value="anime" onchange="switchAvatarView()"> Anime Character</label>
                </div>
            </div>

            <div id="avatar-input-container" style="margin-top: 10px; display: block;">
                <input type="file" id="user-avatar" accept="image/*" onchange="previewUploadedFile(event)">
            </div>

            <div id="anime-select-container" style="margin-top: 10px; display: none;">
                <select id="anime-dp-select">
                    <option value="images/naruto.png">🦊 Naruto Uzumaki (Naruto)</option>
                    <option value="images/kamado.png">⚔️ Tanjiro Kamado (Demon Slayer)</option>
                    <option value="images/kakashi.png">🦅 Eren Yeager (Attack on Titan)</option>
                    <option value="images/gojo.png">🔮 Satoru Gojo (Jujutsu Kaisen)</option>
                </select>
            </div>

            <div style="margin-top: 20px;">
                <button class="next-btn full-width-btn" id="save-profile-btn" onclick="validateAndSaveProfile()">Save Profile & Continue ➡️</button>
            </div>
        </div>

        <!-- Exercise Dashboard Screen -->
        <div id="exercise-screen" class="profile-card" style="display: none;">
            <div class="dashboard-header">
                <h2 id="dashboard-title">Exercise Dashboard</h2>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button class="settings-circle-btn" id="settings-toggle-icon" onclick="toggleSettingsPanel()">⚙️</button>
                    <div id="view-avatar-div" class="avatar-circle"></div>
                </div>
            </div>

            <!-- Exercise Options Panel -->
            <div id="exercise-options-panel" class="workout-buttons">
                <button class="exercise-choice-btn" id="btn-cardio" onclick="selectExerciseCategory('Cardio')">🏃 Cardio Training</button>
                <button class="exercise-choice-btn" id="btn-strength" onclick="selectExerciseCategory('Strength')">🏋️ Strength Workout</button>
                <button class="exercise-choice-btn" id="btn-yoga" onclick="selectExerciseCategory('Yoga')">🧘 Yoga & Flexibility</button>
                
                <div style="margin-top: 20px; display: flex; justify-content: center;">
                    <button onclick="goToProfile()" class="nav-item">👤 Profile</button>
                </div>
            </div>

            <!-- Settings Only Panel -->
            <div id="settings-panel" style="display: none; margin-top: 20px;">
                <label style="font-weight: 600; margin-bottom: 12px; display: block;">Background Track Volume</label>
                <div class="music-control-row">
                    <button class="mute-toggle-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
                    <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5" oninput="adjustVolume(this.value)">
                </div>

                <div class="rest-control" style="margin-top: 20px;">
                    <span>Rest Timer: <strong id="rest-display">30s</strong></span>
                    <div style="display: flex; gap: 10px; margin-top: 8px;">
                        <button class="timer-btn" onclick="changeRestTime(-5)">-5s</button>
                        <button class="timer-btn" onclick="changeRestTime(5)">+5s</button>
                    </div>
                </div>

                <div class="bottom-nav-bar" style="margin-top: 30px;">
                    <button onclick="toggleTheme()" class="nav-item">☀️ Light / 🌙 Dark</button>
                    <button onclick="resetProfile()" class="nav-item">🔄 Reset Dashboard</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Background Audio File -->
    <audio id="bg-audio" loop>
        <source src="audio/workout-track.mp3" type="audio/mpeg">
    </audio>

    <script type="module" src="logic.js"></script>
</body>
</html>
