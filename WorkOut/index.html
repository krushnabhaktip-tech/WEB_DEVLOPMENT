<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <div id="app-box">
        <!-- 1. WELCOME SCREEN -->
        <div id="welcome-screen" class="profile-card">
            <h2>Welcome to Workout Hub</h2>
            <p>Set up your profile and manage your daily routines perfectly.</p>
            <button class="next-btn" onclick="startApp()">Get Started 🚀</button>
        </div>

        <!-- 2. CREATE PROFILE CARD -->
        <div id="profile-setup-card" class="profile-card" style="display: none;">
            <h2>Create Profile</h2>
            
            <div class="form-grid">
                <div>
                    <label>Username</label>
                    <input type="text" id="user-name" placeholder="Enter username">
                </div>
                <div>
                    <label>Age</label>
                    <input type="number" id="user-age" placeholder="Enter age">
                </div>
                <div>
                    <label>Gender</label>
                    <select id="user-gender">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div>
                    <label>Email</label>
                    <input type="email" id="user-email" placeholder="Enter email">
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" id="user-password" placeholder="••••••">
                </div>
                <div>
                    <label>Phone Number</label>
                    <input type="text" id="user-phone" placeholder="Enter phone">
                </div>
            </div>

            <div style="margin-top: 15px;">
                <label>Address</label>
                <input type="text" id="user-address" placeholder="Enter address" style="width: 100%;">
            </div>

            <!-- Avatar Selection Options -->
            <div style="margin-top: 15px;">
                <label style="font-weight: 600;">Choose Profile Display Mode:</label>
                <div class="avatar-options">
                    <label><input type="radio" name="avatar-type" value="upload" checked onchange="switchAvatarView()"> Upload Photo</label>
                    <label><input type="radio" name="avatar-type" value="anime" onchange="switchAvatarView()"> Anime Character</label>
                </div>
            </div>

            <!-- File Upload Input -->
            <div id="avatar-input-container" style="margin-top: 10px; display: block;">
                <input type="file" id="user-avatar" accept="image/*">
            </div>

            <!-- Anime Dropdown Setup -->
            <div id="anime-select-container" style="margin-top: 10px; display: none;">
                <select id="anime-dp-select" style="width: 100%;">
                    <option value="images/naruto.png">🦊 Naruto Uzumaki (Naruto)</option>
                    <option value="images/kamado.png">⚔️ Tanjiro Kamado (Demon Slayer)</option>
                    <option value="images/kakashi.png">🦅 Eren Yeager (Attack on Titan)</option>
                    <option value="images/gojo.png">🔮 Satoru Gojo (Jujutsu Kaisen)</option>
                    <option value="images/narutof.png">💀 Light Yagami (Death Note)</option>
                    <option value="images/marin.png">✨ Marin Kitagawa (My Dress-Up Darling)</option>
                </select>
            </div>

            <div style="margin-top: 20px;">
                <button class="next-btn full-width-btn" onclick="validateAndSaveProfile()">Save Profile & Continue ➡️</button>
            </div>
        </div>

        <!-- 3. EXERCISE DASHBOARD -->
        <div id="exercise-screen" class="profile-card" style="display: none;">
            <div class="dashboard-header">
                <h2>Exercise Dashboard</h2>
                <div id="view-avatar-div" class="avatar-circle"></div>
            </div>

            <div class="workout-buttons">
                <button class="exercise-choice-btn" onclick="selectExerciseCategory('Cardio')">🏃 Cardio Training</button>
                <button class="exercise-choice-btn" onclick="selectExerciseCategory('Strength')">🏋️ Strength Workout</button>
                <button class="exercise-choice-btn" onclick="selectExerciseCategory('Yoga')">🧘 Yoga & Flexibility</button>
            </div>

            <!-- Volume and Control Panels -->
            <div class="music-control-row" style="margin-top: 25px;">
                <span>🔊 Background Track Volume</span>
                <input type="range" id="volume" min="0" max="10" value="5">
            </div>

            <div class="rest-control" style="margin-top: 15px;">
                <span>Rest Timer: <strong id="rest-display">30s</strong></span>
                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <button class="timer-btn" onclick="changeRestTime(-5)">-5s</button>
                    <button class="timer-btn" onclick="changeRestTime(5)">+5s</button>
                </div>
            </div>

            <!-- Footer Navigation Panel (તમારા અસલી બટનો) -->
            <div class="bottom-nav-bar" style="margin-top: 30px;">
                <button onclick="goToProfile()" class="nav-item"><span class="nav-icon">👤</span> Profile</button>
                <button onclick="toggleTheme()" class="nav-item"><span class="nav-icon">☀️</span> Light</button>
                <button onclick="resetProfile()" class="nav-item"><span class="nav-icon">🔄</span> Reset</button>
            </div>
        </div>
    </div>

    <script src="logic.js"></script>
</body>
</html>
